#cloud-config

package_update: true
package_upgrade: true

packages:
  - ca-certificates
  - curl
  - gnupg
  - unattended-upgrades
  - fail2ban
  - ufw

write_files:
  # Backup script
  - path: /opt/scripts/backup.sh
    permissions: "0755"
    content: |
      #!/bin/bash
      set -euo pipefail

      BACKUP_DIR="/opt/backups"
      DATE=$(date +%Y%m%d_%H%M%S)
      RETENTION_DAYS=7

      mkdir -p "$BACKUP_DIR"
      cd /opt/app

      # Load environment variables
      if [ -f .env ]; then
        export $(grep -v '^#' .env | xargs)
      fi

      # Backup PostgreSQL
      echo "Backing up PostgreSQL..."
      docker compose exec -T postgres pg_dump -U "$POSTGRES_USER" "$POSTGRES_DB" | gzip > "$BACKUP_DIR/postgres_$DATE.sql.gz"

      # Backup MySQL/MariaDB
      echo "Backing up MySQL..."
      docker compose exec -T mysql mysqldump -u root -p"$MYSQL_ROOT_PASSWORD" "$MYSQL_DATABASE" | gzip > "$BACKUP_DIR/mysql_$DATE.sql.gz"

      # Backup Pterodactyl data
      echo "Backing up Pterodactyl..."
      docker compose exec -T pterodactyl tar -czf - /app/var 2>/dev/null > "$BACKUP_DIR/pterodactyl_$DATE.tar.gz" || true

      # Clean old backups
      echo "Cleaning backups older than $RETENTION_DAYS days..."
      find "$BACKUP_DIR" -type f -mtime +$RETENTION_DAYS -delete

      echo "Backup completed: $DATE"

  # Docker cleanup script
  - path: /opt/scripts/docker-cleanup.sh
    permissions: "0755"
    content: |
      #!/bin/bash
      docker system prune -af --volumes --filter "until=168h"

  # SSH hardening config
  - path: /etc/ssh/sshd_config.d/hardening.conf
    permissions: "0644"
    content: |
      PermitRootLogin prohibit-password
      PasswordAuthentication no
      PubkeyAuthentication yes
      X11Forwarding no
      MaxAuthTries 3
      ClientAliveInterval 300
      ClientAliveCountMax 2

  # Fail2ban jail config
  - path: /etc/fail2ban/jail.local
    permissions: "0644"
    content: |
      [DEFAULT]
      bantime = 1h
      findtime = 10m
      maxretry = 5

      [sshd]
      enabled = true
      port = ssh
      filter = sshd
      logpath = /var/log/auth.log
      maxretry = 3
      bantime = 24h

  # Unattended upgrades config
  - path: /etc/apt/apt.conf.d/50unattended-upgrades
    permissions: "0644"
    content: |
      Unattended-Upgrade::Allowed-Origins {
          "$${distro_id}:$${distro_codename}";
          "$${distro_id}:$${distro_codename}-security";
          "$${distro_id}ESMApps:$${distro_codename}-apps-security";
          "$${distro_id}ESM:$${distro_codename}-infra-security";
      };
      Unattended-Upgrade::AutoFixInterruptedDpkg "true";
      Unattended-Upgrade::MinimalSteps "true";
      Unattended-Upgrade::Remove-Unused-Kernel-Packages "true";
      Unattended-Upgrade::Remove-Unused-Dependencies "true";
      Unattended-Upgrade::Automatic-Reboot "false";

  - path: /etc/apt/apt.conf.d/20auto-upgrades
    permissions: "0644"
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";

  # Sysctl hardening
  - path: /etc/sysctl.d/99-hardening.conf
    permissions: "0644"
    content: |
      # IP Spoofing protection
      net.ipv4.conf.all.rp_filter = 1
      net.ipv4.conf.default.rp_filter = 1

      # Ignore ICMP broadcast requests
      net.ipv4.icmp_echo_ignore_broadcasts = 1

      # Disable source packet routing
      net.ipv4.conf.all.accept_source_route = 0
      net.ipv6.conf.all.accept_source_route = 0

      # Ignore send redirects
      net.ipv4.conf.all.send_redirects = 0
      net.ipv4.conf.default.send_redirects = 0

      # Block SYN attacks
      net.ipv4.tcp_syncookies = 1
      net.ipv4.tcp_max_syn_backlog = 2048
      net.ipv4.tcp_synack_retries = 2
      net.ipv4.tcp_syn_retries = 5

      # Log Martians
      net.ipv4.conf.all.log_martians = 1

      # Ignore ICMP redirects
      net.ipv4.conf.all.accept_redirects = 0
      net.ipv6.conf.all.accept_redirects = 0

      # Disable IPv6 if not needed
      # net.ipv6.conf.all.disable_ipv6 = 1

runcmd:
  # Install Docker
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

  # Enable and start Docker
  - systemctl enable docker
  - systemctl start docker

  # Create directories
  - mkdir -p /opt/app /opt/backups /opt/scripts
  - chown root:docker /opt/app

  # Login to GitHub Container Registry
  - echo "${ghcr_token}" | docker login ghcr.io -u "${ghcr_username}" --password-stdin

  # Create docker config for root user persistence
  - mkdir -p /root/.docker

  # Apply sysctl settings
  - sysctl -p /etc/sysctl.d/99-hardening.conf

  # Enable and start fail2ban
  - systemctl enable fail2ban
  - systemctl start fail2ban

  # Restart SSH with new config
  - systemctl restart sshd

  # Setup cron jobs
  - echo "0 3 * * * /opt/scripts/backup.sh >> /var/log/backup.log 2>&1" | crontab -
  - (crontab -l; echo "0 4 * * 0 /opt/scripts/docker-cleanup.sh >> /var/log/docker-cleanup.log 2>&1") | crontab -

  # Enable unattended upgrades
  - systemctl enable unattended-upgrades
  - systemctl start unattended-upgrades
