name: Deploy

on:
  push:
    branches:
      - main
    paths-ignore:
      - "terraform/**"
      - "*.md"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  build:
    name: Build Images
    runs-on: ubuntu-latest
    needs: changes
    environment: Production
    permissions:
      contents: read
      packages: write
    outputs:
      backend_tag: ${{ steps.tags.outputs.backend_tag }}
      frontend_tag: ${{ steps.tags.outputs.frontend_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check if images exist
        id: check_images
        run: |
          # Check if backend:latest exists
          if docker manifest inspect ${{ env.IMAGE_PREFIX }}/backend:latest > /dev/null 2>&1; then
            echo "backend_exists=true" >> $GITHUB_OUTPUT
          else
            echo "backend_exists=false" >> $GITHUB_OUTPUT
          fi
          # Check if frontend:latest exists
          if docker manifest inspect ${{ env.IMAGE_PREFIX }}/frontend:latest > /dev/null 2>&1; then
            echo "frontend_exists=true" >> $GITHUB_OUTPUT
          else
            echo "frontend_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and push backend
        if: needs.changes.outputs.backend == 'true' || steps.check_images.outputs.backend_exists == 'false'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/backend:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            sentry_token=${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Build and push frontend
        if: needs.changes.outputs.frontend == 'true' || steps.check_images.outputs.frontend_exists == 'false'
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/frontend:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Determine image tags
        id: tags
        run: |
          # Use sha tag if image was built (changed or didn't exist)
          if [[ "${{ needs.changes.outputs.backend }}" == "true" ]] || [[ "${{ steps.check_images.outputs.backend_exists }}" == "false" ]]; then
            echo "backend_tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          else
            echo "backend_tag=latest" >> $GITHUB_OUTPUT
          fi

          if [[ "${{ needs.changes.outputs.frontend }}" == "true" ]] || [[ "${{ steps.check_images.outputs.frontend_exists }}" == "false" ]]; then
            echo "frontend_tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          else
            echo "frontend_tag=latest" >> $GITHUB_OUTPUT
          fi

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    environment: Production
    defaults:
      run:
        working-directory: terraform
    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Get Server IP
        id: server
        run: |
          SERVER_IP=$(terraform output -raw server_ip)
          echo "ip=$SERVER_IP" >> $GITHUB_OUTPUT

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ steps.server.outputs.ip }} >> ~/.ssh/known_hosts

      - name: Prepare docker-compose.yml with image tags
        working-directory: ${{ github.workspace }}
        run: |
          # Comment out build directives and add image references
          cat docker-compose.yml | \
            sed 's|^\(\s*\)build:|#\1build:|g' | \
            sed 's|^\(\s*\)context:.*|#&|g' | \
            sed 's|^\(\s*\)dockerfile:.*|#&|g' > docker-compose.prod.yml

          # Add image tag for backend service
          sed -i '/^\s*backend:/a\    image: ${{ env.IMAGE_PREFIX }}/backend:${{ needs.build.outputs.backend_tag }}' docker-compose.prod.yml

          # Add image tag for frontend service
          sed -i '/^\s*frontend:/a\    image: ${{ env.IMAGE_PREFIX }}/frontend:${{ needs.build.outputs.frontend_tag }}' docker-compose.prod.yml

          mv docker-compose.prod.yml docker-compose.yml

      - name: Create .env file from .env.example
        working-directory: ${{ github.workspace }}
        env:
          # Variables
          DOMAIN: ${{ vars.DOMAIN }}
          ACME_EMAIL: ${{ vars.ACME_EMAIL }}
          POSTGRES_DB: ${{ vars.POSTGRES_DB }}
          POSTGRES_USER: ${{ vars.POSTGRES_USER }}
          MYSQL_DATABASE: ${{ vars.MYSQL_DATABASE }}
          MYSQL_USER: ${{ vars.MYSQL_USER }}
          GRAFANA_ADMIN_USER: ${{ vars.GRAFANA_ADMIN_USER }}
          PTERODACTYL_URL: ${{ vars.PTERODACTYL_URL }}
          PTERODACTYL_TIMEZONE: ${{ vars.PTERODACTYL_TIMEZONE }}
          PTERODACTYL_EMAIL: ${{ vars.PTERODACTYL_EMAIL }}
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          # Secrets
          TRAEFIK_AUTH: ${{ secrets.TRAEFIK_AUTH }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
        run: |
          # Read keys from .env.example and populate values from environment
          while IFS= read -r line; do
            # Preserve comments and empty lines
            if [[ "$line" =~ ^#.*$ ]] || [[ -z "$line" ]]; then
              echo "$line" >> .env
              continue
            fi
            # Extract key and get value from environment
            key=$(echo "$line" | cut -d'=' -f1)
            value="${!key}"
            echo "$key=$value" >> .env
          done < .env.example

      - name: Copy files to server
        working-directory: ${{ github.workspace }}
        run: |
          # Copy docker-compose, env, and monitoring configs
          scp -o StrictHostKeyChecking=no docker-compose.yml root@${{ steps.server.outputs.ip }}:/opt/app/
          scp -o StrictHostKeyChecking=no .env root@${{ steps.server.outputs.ip }}:/opt/app/
          scp -r -o StrictHostKeyChecking=no monitoring root@${{ steps.server.outputs.ip }}:/opt/app/

      - name: Deploy
        run: |
          ssh -o StrictHostKeyChecking=no root@${{ steps.server.outputs.ip }} << EOF
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd /opt/app
            docker compose pull
            docker compose up -d --remove-orphans
          EOF
