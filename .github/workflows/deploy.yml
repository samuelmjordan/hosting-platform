name: Deploy

on:
  push:
    branches:
      - main
    paths-ignore:
      - "terraform/**"
      - "*.md"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  build:
    name: Build Images
    runs-on: ubuntu-latest
    needs: changes
    permissions:
      contents: read
      packages: write
    outputs:
      backend_tag: ${{ steps.tags.outputs.backend_tag }}
      frontend_tag: ${{ steps.tags.outputs.frontend_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        if: needs.changes.outputs.backend == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/backend:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        if: needs.changes.outputs.frontend == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/frontend:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Determine image tags
        id: tags
        run: |
          if [[ "${{ needs.changes.outputs.backend }}" == "true" ]]; then
            echo "backend_tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          else
            echo "backend_tag=latest" >> $GITHUB_OUTPUT
          fi

          if [[ "${{ needs.changes.outputs.frontend }}" == "true" ]]; then
            echo "frontend_tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          else
            echo "frontend_tag=latest" >> $GITHUB_OUTPUT
          fi

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Get Server IP
        id: server
        run: |
          SERVER_IP=$(terraform output -raw server_ip)
          echo "ip=$SERVER_IP" >> $GITHUB_OUTPUT

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ steps.server.outputs.ip }} >> ~/.ssh/known_hosts

      - name: Prepare docker-compose.yml with image tags
        working-directory: ${{ github.workspace }}
        run: |
          # Comment out build directives and add image references
          cat docker-compose.yml | \
            sed 's|^\(\s*\)build:|#\1build:|g' | \
            sed 's|^\(\s*\)context:.*|#&|g' | \
            sed 's|^\(\s*\)dockerfile:.*|#&|g' > docker-compose.prod.yml

          # Add image tag for backend service
          sed -i '/^\s*backend:/a\    image: ${{ env.IMAGE_PREFIX }}/backend:${{ needs.build.outputs.backend_tag }}' docker-compose.prod.yml

          # Add image tag for frontend service
          sed -i '/^\s*frontend:/a\    image: ${{ env.IMAGE_PREFIX }}/frontend:${{ needs.build.outputs.frontend_tag }}' docker-compose.prod.yml

          mv docker-compose.prod.yml docker-compose.yml

      - name: Copy files to server
        working-directory: ${{ github.workspace }}
        run: |
          # Copy docker-compose and monitoring configs
          scp -o StrictHostKeyChecking=no docker-compose.yml root@${{ steps.server.outputs.ip }}:/opt/app/
          scp -r -o StrictHostKeyChecking=no monitoring root@${{ steps.server.outputs.ip }}:/opt/app/

          # Copy env file if it exists (for first deployment)
          if [ -f .env.prod ]; then
            ssh -o StrictHostKeyChecking=no root@${{ steps.server.outputs.ip }} '[ ! -f /opt/app/.env ]' && \
              scp -o StrictHostKeyChecking=no .env.prod root@${{ steps.server.outputs.ip }}:/opt/app/.env || \
              echo ".env already exists on server, skipping"
          fi

      - name: Deploy
        run: |
          ssh -o StrictHostKeyChecking=no root@${{ steps.server.outputs.ip }} << 'EOF'
            cd /opt/app
            docker compose pull
            docker compose up -d --remove-orphans
          EOF
